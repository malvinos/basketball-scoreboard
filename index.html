<html>
    <head>
        <link rel="stylesheet" href="index.css">
        <link href="https://fonts.cdnfonts.com/css/cursed-timer-ulil" rel="stylesheet">
    </head>
    <body>
        <div class="container">
            <div class="teams">
                <div class="teams_section">
                    <h3>HOME</h3>
                    <p class="points" id="score_home">0</p>
                <div class="add_btns">
                    <button class="add_btn" onclick="add1Home()">+1</button>
                    <button class="add_btn" onclick="add2Home()">+2</button>
                    <button class="add_btn" onclick="add3Home()">+3</button>
                </div>
                </div>
                <div class="teams_section">
                    <h3>GUEST</h3>
                    <p class="points" id="score_guest">0</p>
                <div class="add_btns">
                    <button class="add_btn" onclick="add1Guest()">+1</button>
                    <button class="add_btn" onclick="add2Guest()">+2</button>
                    <button class="add_btn" onclick="add3Guest()">+3</button>
                </div>
                </div>
            </div>
            <button class="start" onclick="startNew()">Start new game</button>
        </div>
        <script src="index.js" type="module"></script>
    </body>
</html>
